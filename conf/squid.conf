# Squid relay for lancache-http-proxy.
#
# Purpose: accept the *origin-form* HTTP requests that lancache's nginx emits
# (`GET /path` + `Host:` header) and re-emit them as *absolute-form*
# (`GET http://host/path`) to an upstream HTTP forward proxy.
#
# Why this exists: a standard forward proxy (Squid, etc.) only accepts
# absolute-form requests; nginx's `proxy_pass` can only send origin-form. So
# nginx cannot talk to a forward proxy directly. Running Squid here in
# accelerator (reverse-proxy) mode bridges the two: accel/vhost accepts
# origin-form, and a `cache_peer ... parent` re-emits absolute-form upstream.

# ── Access control (relay is loopback-only; this is permissive on purpose) ──
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT
http_access deny CONNECT !SSL_ports
http_access allow all

# ── Listener: accel/vhost accepts lancache's origin-form requests ──
# Loopback only — reached via the shared network namespace from lancache.
http_port 127.0.0.1:3129 accel vhost

# ── Upstream parent: YOUR forward proxy. EDIT THIS LINE. ──
# Example (an ISP caching proxy): cache_peer proxy.example-isp.net parent 8080 0 no-query default
cache_peer UPSTREAM_PROXY_HOST parent UPSTREAM_PROXY_PORT 0 no-query default

# Force every request through the parent. (Fallback-to-direct is handled one
# layer up, in nginx, so a dead parent never hard-breaks downloads — see
# conf/30_primary_proxy.conf.)
never_direct allow all

# Don't double-cache here; lancache already caches to disk and the parent
# caches upstream.
cache deny all

# Logs (writable by the container's unprivileged squid user)
access_log stdio:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
pid_filename none
