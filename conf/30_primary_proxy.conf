  # lancache-http-proxy: route cache-MISS upstream fetches through the local
  # relay (squid accel -> your parent proxy), with automatic fallback to a
  # direct CDN fetch if the relay or the parent proxy is unavailable.
  #
  # This file overrides lancache monolithic's stock upstream block
  #   (/etc/nginx/sites-available/upstream.conf.d/30_primary_proxy.conf)
  # via a read-only bind-mount.

  location / {
    # Hand the request to the relay on loopback. $request_uri stays the path;
    # the real CDN host is carried in the Host header so the relay (accel/vhost)
    # can reconstruct the absolute URL for the parent proxy.
    proxy_pass http://127.0.0.1:3129$request_uri;
    proxy_set_header Host $host;

    # lancache's redirect handling (e.g. PlayStation 302s) is preserved.
    proxy_intercept_errors on;
    error_page 301 302 307 = @upstream_redirect;

    # Resilience: if the relay is down (connection refused -> 502), the parent
    # proxy is dead (squid 503/504), or the parent demands auth we don't have
    # (407), transparently retry the CDN directly so downloads never hard-break.
    error_page 407 502 503 504 = @direct_fallback;
  }

  # Fallback: fetch straight from the CDN, exactly like stock lancache.
  location @direct_fallback {
    proxy_pass http://$host$request_uri;
    proxy_intercept_errors on;
    error_page 301 302 307 = @upstream_redirect;
  }
