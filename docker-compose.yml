# lancache-http-proxy — a standard lancache (monolithic) deployment that routes
# cache-MISS (first-time) downloads through an upstream HTTP forward proxy.
#
# 1. Copy .env.example to .env and edit it (including UPSTREAM_PROXY_HOST/PORT).
# 2. docker compose up -d
#
# See README.md for the full explanation and verification steps.

services:
  lancache:
    image: lancachenet/monolithic:latest
    container_name: lancache
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # DNS is provided by lancache-dns, which shares this container's network
      # namespace — so its port is published here, on lancache.
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ${CACHE_ROOT:-./data}/cache:/data/cache
      - ${CACHE_ROOT:-./data}/logs:/data/logs
      # The one override that makes MISSes go through the relay (with fallback).
      # ':z' relabels the bind mount for SELinux hosts (no-op elsewhere).
      - ./conf/30_primary_proxy.conf:/etc/nginx/sites-available/upstream.conf.d/30_primary_proxy.conf:ro,z
    environment:
      - CACHE_DISK_SIZE=${CACHE_DISK_SIZE:-1000g}
      - CACHE_MAX_AGE=${CACHE_MAX_AGE:-3650d}
      - UPSTREAM_DNS=${UPSTREAM_DNS:-1.1.1.1 8.8.8.8}

  lancache-dns:
    image: lancachenet/lancache-dns:latest
    container_name: lancache-dns
    restart: unless-stopped
    # Share lancache's netns so both answer on the same IP (cache 80/443, DNS 53).
    network_mode: "service:lancache"
    depends_on:
      - lancache
    environment:
      - USE_GENERIC_CACHE=true
      # The IP your clients will use as their DNS server / cache target.
      - LANCACHE_IP=${LANCACHE_IP:?set LANCACHE_IP in .env (the host/LAN IP clients point at)}
      - UPSTREAM_DNS=${UPSTREAM_DNS:-1.1.1.1 8.8.8.8}

  # The relay: bridges lancache's nginx (origin-form) to your forward proxy
  # (absolute-form). Listens on 127.0.0.1:3129 inside the shared netns. Your
  # proxy is set ONCE, in .env (UPSTREAM_PROXY_HOST/PORT) — it's substituted
  # into the squid config at startup, so you never edit a config file.
  proxy-relay:
    image: ubuntu/squid:latest
    container_name: lancache-proxy-relay
    restart: unless-stopped
    network_mode: "service:lancache"
    depends_on:
      - lancache
    environment:
      - UPSTREAM_PROXY_HOST=${UPSTREAM_PROXY_HOST:?set UPSTREAM_PROXY_HOST in .env (your forward proxy host)}
      - UPSTREAM_PROXY_PORT=${UPSTREAM_PROXY_PORT:-8080}
      # Optional HTTP Basic credentials — leave blank unless your proxy needs them.
      - UPSTREAM_PROXY_USER=${UPSTREAM_PROXY_USER:-}
      - UPSTREAM_PROXY_PASS=${UPSTREAM_PROXY_PASS:-}
    volumes:
      # ':z' relabels the bind mounts for SELinux hosts (no-op elsewhere).
      - ./conf/squid.conf.template:/squid.conf.template:ro,z
      - ./conf/healthcheck.sh:/healthcheck.sh:ro,z
    # Fill the proxy into the config from .env, then start squid with it.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        case "$$UPSTREAM_PROXY_HOST" in
          *:*) echo "ERROR: UPSTREAM_PROXY_HOST must be a bare host with NO port (put the port in UPSTREAM_PROXY_PORT). Got: $$UPSTREAM_PROXY_HOST" >&2; exit 1 ;;
        esac
        LOGIN=""
        [ -n "$$UPSTREAM_PROXY_USER" ] && LOGIN="login=$$UPSTREAM_PROXY_USER:$$UPSTREAM_PROXY_PASS"
        # escape sed-special chars so credentials containing \ & | substitute literally
        LOGIN=$(printf '%s' "$$LOGIN" | sed 's/[\\&|]/\\&/g')
        sed -e "s|__PROXY_HOST__|$$UPSTREAM_PROXY_HOST|g" \
            -e "s|__PROXY_PORT__|$$UPSTREAM_PROXY_PORT|g" \
            -e "s|__PROXY_LOGIN__|$$LOGIN|g" \
            /squid.conf.template > /tmp/squid.conf
        exec entrypoint.sh -f /tmp/squid.conf -NYC
    # UNHEALTHY if the parent proxy stops serving (downloads still work via the
    # nginx direct-fallback, but you'll see the degraded state).
    healthcheck:
      test: ["CMD", "bash", "/healthcheck.sh"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 20s

  # OPTIONAL self-healing watchdog. lancache-dns and proxy-relay share lancache's
  # netns; when lancache is RECREATED they get orphaned and EXIT, and
  # `restart: unless-stopped` can't recover them (they're stopped, not
  # "unhealthy"). This watchdog runs in its OWN netns (so it survives a lancache
  # recreate), restarts any down container, and alerts you. Notifications are
  # configured in .env (Pushover and/or a webhook); with none set it just logs.
  # NOTE: it mounts the Docker socket to restart containers — that's privileged
  # access. Delete this service if you don't want a watchdog.
  watchdog:
    image: docker:cli
    container_name: lancache-watchdog
    restart: unless-stopped
    # Resolve alert endpoints via public DNS, independent of the cache — so the
    # watchdog can still reach Pushover / your webhook even when the cache (your
    # normal resolver) is the thing that's down. Healing itself needs no DNS;
    # it talks to Docker over the socket.
    dns: ${WATCHDOG_DNS:-1.1.1.1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./conf/watchdog.sh:/watchdog.sh:ro
      - ${CACHE_ROOT:-./data}/watchdog-state:/state
    environment:
      # Alerts — set in .env; all blank = log-only (still self-heals).
      - PUSHOVER_APP_TOKEN=${PUSHOVER_APP_TOKEN:-}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY:-}
      - WATCHDOG_WEBHOOK_URL=${WATCHDOG_WEBHOOK_URL:-}
      # Containers to watch (first = netns owner); override only if you renamed them.
      - WATCHDOG_CONTAINERS=${WATCHDOG_CONTAINERS:-lancache lancache-dns lancache-proxy-relay}
    entrypoint: ["/bin/sh", "/watchdog.sh"]
