<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-label="Request flow: a game client whose DNS points at lancache sends an HTTP request. On a cache HIT it is served from disk at LAN speed. On a MISS, lancache proxy_passes the origin-form request to a local Squid relay (accel/vhost mode), which re-emits it as absolute-form to your upstream HTTP proxy and on to the CDN. If the relay or proxy is down, lancache fetches the CDN directly.">
  <defs>
    <style>
      .lbl  { fill:#e6edf3; }
      .mut  { fill:#8b949e; }
      .mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .nodet{ fill:#e6edf3; font-weight:700; }
    </style>
    <marker id="aMut" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#8b949e"/></marker>
    <marker id="aGrn" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#3fb950"/></marker>
    <marker id="aAmb" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#d29922"/></marker>
    <marker id="aCyn" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#39c5cf"/></marker>
    <marker id="aDsh" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#6e7681"/></marker>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="904" height="584" rx="16" fill="#0d1117" stroke="#30363d"/>
  <text x="32" y="42" class="lbl" font-size="14" font-weight="700">How a request flows</text>
  <text x="186" y="42" class="mut" font-size="12.5">first download accelerated · repeats served from disk</text>

  <!-- client -->
  <rect x="320" y="66" width="280" height="50" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="460" y="90" text-anchor="middle" class="nodet" font-size="14.5">Game client</text>
  <text x="460" y="107" text-anchor="middle" class="mut" font-size="11.5">its DNS points at the cache</text>

  <!-- client -> container -->
  <path d="M460,116 V170" fill="none" stroke="#8b949e" stroke-width="1.6" marker-end="url(#aMut)"/>
  <text x="478" y="139" class="lbl mono" font-size="12">GET /game/chunk</text>
  <text x="478" y="155" class="mut mono" font-size="11">Host: cdn.example · HTTP :80</text>

  <!-- container -->
  <rect x="40" y="176" width="840" height="296" rx="14" fill="#0e141b" stroke="#30363d" stroke-width="1.5"/>
  <rect x="356" y="165" width="208" height="26" rx="13" fill="#0d1117" stroke="#58a6ff" stroke-width="1.3"/>
  <text x="460" y="183" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">lancache (monolithic)</text>

  <!-- split trunk -->
  <path d="M460,206 V237" fill="none" stroke="#8b949e" stroke-width="1.6"/>
  <circle cx="460" cy="206" r="3.5" fill="#8b949e"/>

  <!-- HIT branch -->
  <path d="M460,237 H592" fill="none" stroke="#3fb950" stroke-width="1.6" marker-end="url(#aGrn)"/>
  <rect x="598" y="213" width="244" height="50" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="720" y="236" text-anchor="middle" class="nodet" font-size="13.5">served from disk</text>
  <text x="720" y="253" text-anchor="middle" fill="#3fb950" font-size="11.5">cache HIT · LAN speed</text>

  <!-- MISS branch -->
  <path d="M460,237 V320" fill="none" stroke="#d29922" stroke-width="1.6" marker-end="url(#aAmb)"/>
  <text x="476" y="266" fill="#d29922" font-size="12.5" font-weight="700">cache MISS</text>
  <text x="476" y="288" class="lbl mono" font-size="11.5">proxy_pass → 127.0.0.1:3129</text>
  <text x="476" y="303" class="mut mono" font-size="10.5">origin-form: GET /game/chunk</text>

  <!-- relay node -->
  <rect x="300" y="322" width="320" height="48" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="460" y="346" text-anchor="middle" class="nodet" font-size="14.5">proxy-relay</text>
  <text x="460" y="362" text-anchor="middle" fill="#bc8cff" font-size="11.5">Squid · accel / vhost mode</text>

  <!-- relay -> out of container -> proxy -->
  <path d="M460,370 V470 L372,510" fill="none" stroke="#39c5cf" stroke-width="1.6" marker-end="url(#aCyn)"/>
  <text x="476" y="416" class="lbl mono" font-size="11.5">re-emits absolute-form</text>
  <text x="476" y="431" fill="#39c5cf" font-size="10.5" class="mono">GET http://cdn.example/game/chunk</text>

  <!-- fallback (direct) -->
  <path d="M624,470 C688,492 706,500 724,508" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aDsh)"/>
  <text x="566" y="488" class="mut" font-size="10.5">fallback · relay/proxy down</text>
  <text x="566" y="501" class="mut" font-size="10.5">→ fetch CDN directly</text>

  <!-- upstream proxy node -->
  <rect x="236" y="510" width="268" height="52" rx="10" fill="#161b22" stroke="#39c5cf" stroke-width="1.5"/>
  <text x="370" y="534" text-anchor="middle" class="nodet" font-size="14">Upstream HTTP proxy</text>
  <text x="370" y="551" text-anchor="middle" fill="#39c5cf" font-size="11.5">your ISP, etc.</text>

  <!-- proxy -> CDN -->
  <path d="M504,536 H636" fill="none" stroke="#8b949e" stroke-width="1.6" marker-end="url(#aMut)"/>

  <!-- CDN node -->
  <rect x="640" y="510" width="172" height="52" rx="10" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="726" y="534" text-anchor="middle" class="nodet" font-size="14.5">CDN</text>
  <text x="726" y="551" text-anchor="middle" class="mut" font-size="11.5">game origin</text>
</svg>
